<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LIK RESIN ART</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f8f8f8;
}

/* VIDEO PAGE */

#videoPage{
width:100%;
height:100vh;
overflow:hidden;
position:relative;
background:black;
}

#desktopVideo,
#mobileVideo{
width:100%;
height:100%;
object-fit:cover;
}

#mobileVideo{
display:none;
}

.logo-overlay{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
}

.logo-overlay img{
width:150px;
}

.logo-overlay h2{
margin-top:10px;
}

/* PRODUCT PAGE */

#productPage{
display:none;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header img{
width:180px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:10px 0;
}

.price{
color:#0E6B73;
font-size:20px;
font-weight:bold;
}

.qty{
width:70px;
padding:5px;
margin-top:10px;
}

.form-section{
background:white;
padding:20px;
margin-top:30px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#0E6B73;
color:white;
border:none;
padding:12px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:8px;
}

button:hover{
background:#084b50;
}

@media(max-width:768px){
#desktopVideo{
display:none;
}

#mobileVideo{
display:block;
}
}
</style>
</head>

<body>

<!-- VIDEO PAGE -->

<section id="videoPage">

<video id="desktopVideo" autoplay muted playsinline>
<source src="desktop-video.mp4" type="video/mp4">
</video>

<video id="mobileVideo" autoplay muted playsinline>
<source src="mobile-video.mp4" type="video/mp4">
</video>

<div class="logo-overlay">
<img src="logo.png">
<h2>LIK RESIN ART</h2>
<p>Art You'll Like!</p>
</div>

</section>

<!-- PRODUCT PAGE -->

<section id="productPage">
